name: Pull request build
on:
  pull_request:
permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            task: :health:testAndroidHostTest
          - runner: macos-latest
            task: :health:iosSimulatorArm64Test
          - runner: macos-latest
            task: :health:watchosSimulatorArm64Test

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - run: ./gradlew ${{ matrix.task }}
